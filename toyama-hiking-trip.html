<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multi-day Route Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#191919;
    --panel:#202020;
    --line:#373737;
    --text:#eceae7;
    --muted:#9b9b9b;
    --start:#3ddc84;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}
  #app{max-width:1100px;margin:0 auto;padding:18px 20px 24px;}

  .stats{display:flex;gap:28px;flex-wrap:wrap;margin-bottom:12px;}
  .stat .num{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:27px;line-height:1;color:var(--text);}
  .stat .lbl{font-size:10px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-top:2px;}


  #map{height:320px;border-radius:8px;border:1px solid var(--line);background:#0f0f0f;}

  .elev-wrap{margin-top:2px;background:var(--panel);border:1px solid var(--line);border-top:none;border-radius:0 0 8px 8px;padding:10px 16px 8px;position:relative;}
  .elev-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
  .elev-head h3{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;margin:0;}
  .elev-head span{font-size:10px;color:var(--muted);}

  svg#chart{width:100%;height:130px;display:block;overflow:visible;}
  .day-label{font-size:9.5px;fill:var(--muted);font-family:'Inter',sans-serif;}
  .axis-label{font-size:9.5px;fill:var(--muted);font-family:'Inter',sans-serif;}
  .axis-line{stroke:var(--line);stroke-width:1;}
  .tooltip{
    position:absolute;pointer-events:none;background:#1a1a1d;border:1px solid var(--line);
    border-radius:5px;padding:6px 10px;font-size:12px;color:var(--text);white-space:nowrap;
    transform:translate(-50%,-115%);opacity:0;transition:opacity .1s;
    z-index:1000; /* Leaflet's internal panes use z-index up to ~650 — without this,
                     the tooltip gets painted behind the map whenever it's pushed up
                     over the map's screen area (e.g. hovering a peak near the top
                     of the chart, right below the map). */
  }
  .tooltip b{color:#ff5b46;}
  .tooltip .day-tag{color:var(--muted);}
  .leaflet-control-attribution{background:rgba(10,10,11,.7)!important;color:var(--muted)!important;font-size:10px;}
  .leaflet-control-attribution a{color:var(--muted)!important;}
  .day-marker-label{
    background:#000;color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;
    font-family:'Inter',sans-serif;border:1px solid rgba(255,255,255,.4);white-space:nowrap;
  }

  .day-table-wrap{margin-top:12px;background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow-x:auto;}
  table.day-table{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap;}
  table.day-table th, table.day-table td{padding:6px 12px;text-align:left;border-bottom:1px solid var(--line);}
  table.day-table th{font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  table.day-table tbody tr:last-child td{border-bottom:none;}
  table.day-table td.num{font-variant-numeric:tabular-nums;}
  table.day-table .day-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:middle;}
  table.day-table tfoot td{border-top:1px solid var(--line);border-bottom:none;font-weight:600;color:var(--text);}
</style>
</head>
<body>
<div id="app">
  <div class="stats" id="statsRow"></div>

  <div id="map"></div>
  <div class="elev-wrap">
    <div class="elev-head">
      <h3>Elevation Profile — Full Trip</h3>
      <span>Hover to trace the course</span>
    </div>
    <svg id="chart" viewBox="0 0 1000 130" preserveAspectRatio="none"></svg>
    <div class="tooltip" id="tooltip"></div>
  </div>

  <div class="day-table-wrap">
    <table class="day-table" id="dayTable"></table>
  </div>
</div>

let map, hoverMarker, allPoints = [];

// Math.min/max(...arr) blows the call stack on large arrays (V8's argument
// limit is roughly 65k) — thru-hike tracks with 100k+ points hit this.
// Plain loops have no such limit.
function minOf(arr){ let m = Infinity; for(const v of arr) if(v < m) m = v; return m; }
function maxOf(arr){ let m = -Infinity; for(const v of arr) if(v > m) m = v; return m; }

function initMap(){
  map = L.map('map',{zoomControl:true, attributionControl:true}).setView([0,0],3);
  const tiles = L.tileLayer('https://services.arcgisonline.com/arcgis/rest/services/Canvas/World_Dark_Gray_Base/MapServer/tile/{z}/{y}/{x}',{
    attribution:'&copy; Esri, HERE, Garmin, OpenStreetMap contributors',
    maxZoom:16, minZoom:2
  }).addTo(map);
  let tileErrors = 0;
  tiles.on('tileerror', ()=>{
    tileErrors++;
    if(tileErrors===6){
      document.querySelector('.elev-head span').textContent = 'map tiles failed to load — check network/firewall';
    }
  });
}

function drawStats(days, stats){
  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><div class="num">${stats.distance_km.toFixed(1)} KM</div><div class="lbl">Total Distance</div></div>
    <div class="stat"><div class="num">+${Math.round(stats.climb_m)} M</div><div class="lbl">Total Climb</div></div>
    <div class="stat"><div class="num">-${Math.round(stats.loss_m||0)} M</div><div class="lbl">Total Descent</div></div>
    <div class="stat"><div class="num">${Math.round(stats.max_ele_m)} M</div><div class="lbl">Max Elevation</div></div>
    <div class="stat"><div class="num">${days.length}</div><div class="lbl">Days</div></div>
  `;
}

function render(days, stats, tripName){
  drawStats(days, stats);

  const bounds = [];
  allPoints = [];

  days.forEach((day, dayIdx)=>{
    const latlngs = day.points.map(p=>[p[0],p[1]]);
    latlngs.forEach(ll=>bounds.push(ll));

    day.points.forEach(p=>{
      allPoints.push({lat:p[0], lng:p[1], ele:p[2], dist:p[3], dayIdx});
    });

    // Day start marker (skip day 0 — gets the big green "trip start" marker instead)
    if(dayIdx > 0){
      const m = L.circleMarker(latlngs[0], {radius:6, color:'#0a0a0b', weight:2, fillColor: day.color, fillOpacity:1}).addTo(map);
      m.bindTooltip(day.name, {direction:'top', className:'day-marker-label', offset:[0,-4]});
    }
  });

  // Single continuous route line in the standard skill-1 red, across all days
  const allLatLngs = allPoints.map(p=>[p.lat,p.lng]);
  L.polyline(allLatLngs, {color:'#ff4433', weight:3.5, opacity:0.95}).addTo(map);

  const first = days[0].points[0];
  const lastDay = days[days.length-1];
  const last = lastDay.points[lastDay.points.length-1];
  L.circleMarker([first[0],first[1]], {radius:7,color:'#0a0a0b',weight:2,fillColor:'#3ddc84',fillOpacity:1})
    .addTo(map).bindTooltip('Trip start', {direction:'top', className:'day-marker-label', offset:[0,-4]});
  L.circleMarker([last[0],last[1]], {radius:7,color:'#0a0a0b',weight:2,fillColor:'#ffffff',fillOpacity:1})
    .addTo(map).bindTooltip('Trip end', {direction:'top', className:'day-marker-label', offset:[0,-4]});

  hoverMarker = L.circleMarker(latlngsFirst(days), {radius:5.5,color:'#fff',weight:2,fillColor:'#ff4433',fillOpacity:1}).addTo(map);
  hoverMarker.setStyle({opacity:0, fillOpacity:0});

  map.fitBounds(bounds, {padding:[30,30]});

  drawChart(days, allPoints);
  drawDayTable(days, EMBEDDED_DAY_STATS);
}

function latlngsFirst(days){
  const p = days[0].points[0];
  return [p[0], p[1]];
}

function niceElevationTicks(minE, maxE, targetCount){
  const range = maxE - minE;
  if(range <= 0) return [Math.round(minE)];
  const roughStep = range / targetCount;
  const magnitude = Math.pow(10, Math.floor(Math.log10(roughStep)));
  const residual = roughStep / magnitude;
  const niceResidual = residual < 1.5 ? 1 : residual < 3 ? 2 : residual < 7 ? 5 : 10;
  const step = niceResidual * magnitude;
  const ticks = [];
  let t = Math.ceil(minE / step) * step;
  for(; t <= maxE; t += step){ ticks.push(Math.round(t)); }
  return ticks;
}

function drawChart(days, points){
  const svg = document.getElementById('chart');
  const W=1000, H=130, padB=16, padT=8, padL=42;
  const maxD = points[points.length-1].dist;
  const eles = points.map(p=>p.ele);
  const minE = minOf(eles), maxE = maxOf(eles);
  // xs/ys keep the exact same value-to-pixel scale as before (still mapped to
  // the true min/max of the data, not from 0) — padL just shifts the drawable
  // area right to make room for axis labels on the left, it doesn't change
  // the shape of the line at all.
  const xs = d => padL + (d/maxD)*(W-padL);
  const ys = e => H-padB - ((e-minE)/(maxE-minE||1))*(H-padB-padT);

  let line = `M${xs(points[0].dist).toFixed(1)},${ys(points[0].ele).toFixed(1)}`;
  points.forEach(p=>{ line += ` L${xs(p.dist).toFixed(1)},${ys(p.ele).toFixed(1)}`; });
  let area = line + ` L${W},${H-padB} L${xs(points[0].dist).toFixed(1)},${H-padB} Z`;

  let dividers = '';
  days.forEach((day, dayIdx)=>{
    const dayStartDist = day.points[0][3];
    const dayLabelX = xs(dayStartDist) + 4;
    if(dayIdx > 0){
      const boundaryX = xs(dayStartDist);
      dividers += `<line x1="${boundaryX.toFixed(1)}" y1="0" x2="${boundaryX.toFixed(1)}" y2="${H-padB}" stroke="#555" stroke-width="1" stroke-dasharray="2,3"></line>`;
    }
    dividers += `<circle cx="${xs(dayStartDist).toFixed(1)}" cy="${(H-padB).toFixed(1)}" r="3" fill="${day.color}"></circle>`;
    dividers += `<text class="day-label" x="${dayLabelX.toFixed(1)}" y="12">Day ${dayIdx+1}</text>`;
  });

  // Elevation axis — reference labels only, scale is identical to the plotted line
  const ticks = niceElevationTicks(minE, maxE, 4);
  let axis = `<line class="axis-line" x1="${padL.toFixed(1)}" y1="${padT}" x2="${padL.toFixed(1)}" y2="${(H-padB).toFixed(1)}"></line>`;
  ticks.forEach(t=>{
    const ty = ys(t);
    axis += `<text class="axis-label" x="${(padL-8).toFixed(1)}" y="${(ty+3.5).toFixed(1)}" text-anchor="end">${t}m</text>`;
    axis += `<line class="axis-line" x1="${(padL-3).toFixed(1)}" y1="${ty.toFixed(1)}" x2="${padL.toFixed(1)}" y2="${ty.toFixed(1)}"></line>`;
  });

  svg.innerHTML = `
    <defs>
      <linearGradient id="fillGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#ff4433" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#ff4433" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="${area}" fill="url(#fillGrad)"></path>
    <path d="${line}" fill="none" stroke="#ff5b46" stroke-width="1.6"></path>
    ${dividers}
    ${axis}
    <line id="hoverLine" x1="0" y1="0" x2="0" y2="${H-padB}" stroke="#ffffff" stroke-width="1" stroke-dasharray="3,3" opacity="0"></line>
    <circle id="hoverDot" r="4" fill="#fff" stroke="#ff4433" stroke-width="2" opacity="0"></circle>
    <rect id="hitArea" x="${padL}" y="0" width="${W-padL}" height="${H}" fill="transparent"></rect>
  `;

  const hitArea = svg.getElementById('hitArea');
  const hoverLine = svg.getElementById('hoverLine');
  const hoverDot = svg.getElementById('hoverDot');
  const tooltip = document.getElementById('tooltip');
  const wrap = document.querySelector('.elev-wrap');

  function updateAt(clientX){
    const rect = hitArea.getBoundingClientRect();
    let frac = (clientX - rect.left) / rect.width;
    frac = Math.max(0, Math.min(1, frac));
    const targetDist = frac * maxD;
    let idx = 0, best = Infinity;
    for(let i=0;i<points.length;i++){
      const diff = Math.abs(points[i].dist - targetDist);
      if(diff < best){ best = diff; idx = i; }
    }
    const p = points[idx];
    const px = xs(p.dist), py = ys(p.ele);
    hoverLine.setAttribute('x1',px); hoverLine.setAttribute('x2',px); hoverLine.setAttribute('opacity',1);
    hoverDot.setAttribute('cx',px); hoverDot.setAttribute('cy',py); hoverDot.setAttribute('opacity',1);

    hoverMarker.setLatLng([p.lat,p.lng]);
    hoverMarker.setStyle({opacity:1, fillOpacity:1});

    const wrapRect = wrap.getBoundingClientRect();
    tooltip.style.left = (clientX - wrapRect.left) + 'px';
    tooltip.style.top = py + 'px';
    tooltip.style.opacity = 1;
    const dayDist_km = ((p.dist - days[p.dayIdx].points[0][3]) / 1000).toFixed(1);
    tooltip.innerHTML = `<span class="day-tag">Day ${p.dayIdx+1}</span> · <b>${(p.dist/1000).toFixed(1)} km</b> total · ${Math.round(p.ele)} m <span class="day-tag">(${dayDist_km} km into day)</span>`;
  }

  function hide(){
    hoverLine.setAttribute('opacity',0);
    hoverDot.setAttribute('opacity',0);
    tooltip.style.opacity = 0;
    hoverMarker.setStyle({opacity:0, fillOpacity:0});
  }

  hitArea.addEventListener('mousemove', e=>updateAt(e.clientX));
  hitArea.addEventListener('mouseleave', hide);
  hitArea.addEventListener('touchmove', e=>{ updateAt(e.touches[0].clientX); e.preventDefault(); }, {passive:false});
  hitArea.addEventListener('touchend', hide);
}

function fmtDuration(seconds){
  if(seconds==null) return '—';
  const h = Math.floor(seconds/3600);
  const m = Math.round((seconds%3600)/60);
  return `${h}h ${String(m).padStart(2,'0')}m`;
}

function fmtTime(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const hh = String(d.getUTCHours()).padStart(2,'0');
  const mm = String(d.getUTCMinutes()).padStart(2,'0');
  return `${months[d.getUTCMonth()]} ${d.getUTCDate()}, ${hh}:${mm}`;
}

function drawDayTable(days, dayStats){
  const table = document.getElementById('dayTable');
  if(!dayStats || !dayStats.length){ table.innerHTML = ''; return; }

  const hasTimes = dayStats.some(d => d.start_time);

  let head = `<thead><tr>
    <th>Day</th><th>Distance</th><th>Gain</th><th>Loss</th><th>Time on Trail</th>
    ${hasTimes ? `<th>Start (${EMBEDDED_TZ_LABEL})</th><th>End (${EMBEDDED_TZ_LABEL})</th>` : ''}
  </tr></thead>`;

  let totalDist=0, totalGain=0, totalLoss=0, totalDur=0, anyDur=false;

  let rows = dayStats.map((d,i)=>{
    totalDist += d.distance_km; totalGain += d.gain_m; totalLoss += d.loss_m;
    if(d.duration_s!=null){ totalDur += d.duration_s; anyDur = true; }
    const color = days[i] ? days[i].color : '#888';
    return `<tr>
      <td><span class="day-dot" style="background:${color}"></span>Day ${d.day}: ${d.name.replace(/^Day \d+:\s*/,'')}</td>
      <td class="num">${d.distance_km.toFixed(1)} km</td>
      <td class="num">+${d.gain_m} m</td>
      <td class="num">-${d.loss_m} m</td>
      <td class="num">${fmtDuration(d.duration_s)}</td>
      ${hasTimes ? `<td class="num">${fmtTime(d.start_time)}</td><td class="num">${fmtTime(d.end_time)}</td>` : ''}
    </tr>`;
  }).join('');

  let foot = `<tfoot><tr>
    <td>Total</td>
    <td class="num">${totalDist.toFixed(1)} km</td>
    <td class="num">+${Math.round(totalGain)} m</td>
    <td class="num">-${Math.round(totalLoss)} m</td>
    <td class="num">${anyDur ? fmtDuration(totalDur) : '—'}</td>
    ${hasTimes ? '<td></td><td></td>' : ''}
  </tr></tfoot>`;

  table.innerHTML = head + `<tbody>${rows}</tbody>` + foot;
}

initMap();
render(EMBEDDED_DAYS, EMBEDDED_STATS, EMBEDDED_TRIP_NAME);
</script>
